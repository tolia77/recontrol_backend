# version: '3.8' <-- This line is obsolete and can be removed
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: build
    volumes:
      - .:/rails
      - bundle_gems:/usr/local/bundle
    ports:
      - "3003:3000"

    # Load all variables from the .env.development file
    env_file: .env.development

    # Override/set specific variables for the container environment
    environment:
      RAILS_ENV: development
      # Override the host to use the Docker service name 'db'
      DB_DEV_HOST: db
      # Set DATABASE_URL (if your app uses it)
      DATABASE_URL: "postgres://${DB_DEV_USER}:${DB_DEV_PASSWORD}@db:5432/${DB_DEV_NAME}"

    # --- UPDATED COMMAND ---
    # This now *only* removes the old server.pid and starts the server.
    command: /bin/bash -c "rm -f tmp/pids/server.pid && ./bin/rails s -b 0.0.0.0"

    depends_on:
      db_prepare:
        condition: service_completed_successfully

  db_prepare:
    build:
      context: .
      dockerfile: Dockerfile
      target: build
    volumes:
      - .:/rails
      - bundle_gems:/usr/local/bundle
    env_file: .env.development
    environment:
      RAILS_ENV: development
      DB_DEV_HOST: db
      DATABASE_URL: "postgres://${DB_DEV_USER}:${DB_DEV_PASSWORD}@db:5432/${DB_DEV_NAME}"
    command: ./bin/rails db:prepare
    restart: "no"
    depends_on:
      - db

  jobs:
    build:
      context: .
      dockerfile: Dockerfile
      target: build
    volumes:
      - .:/rails
      - bundle_gems:/usr/local/bundle
    env_file: .env.development
    environment:
      RAILS_ENV: development
      DB_DEV_HOST: db
      DATABASE_URL: "postgres://${DB_DEV_USER}:${DB_DEV_PASSWORD}@db:5432/${DB_DEV_NAME}"
    command: ./bin/jobs
    depends_on:
      db_prepare:
        condition: service_completed_successfully

  db:
    image: postgres:18
    env_file: .env.development

    environment:
      POSTGRES_USER: ${DB_DEV_USER}
      POSTGRES_PASSWORD: ${DB_DEV_PASSWORD}
      POSTGRES_DB: ${DB_DEV_NAME}

    # PG18+ uses /var/lib/postgresql/<MAJOR>/docker; mount the parent so
    # future major upgrades can use pg_upgrade --link against sibling dirs.
    volumes:
      - postgres_data_dev:/var/lib/postgresql

volumes:
  postgres_data_dev:
  bundle_gems: